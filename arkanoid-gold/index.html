<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ARK GOLD</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #06050e;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

body {
  font-family: 'Courier New', monospace;
}

#app {
  max-width: 500px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: stretch;
}

/* ── PLAY AREA ────────────────────────────── */
#c {
  display: block;
  width: 100%;
  flex: 1 1 auto;
  min-height: 0;
}

/* ── HUD ──────────────────────────────────── */
#hud {
  flex: 0 0 auto;
  background: #08070f;
  border-top: 1px solid #1e1a2e;
  padding: 10px 16px env(safe-area-inset-bottom, 10px);
  display: flex;
  flex-direction: column;
  gap: 9px;
}

/* Stats row */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}

.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 4px 0;
  border-right: 1px solid #18152a;
}
.stat:last-child { border-right: none; }

.slabel {
  font-size: 8px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: #4a3f6b;
}

.sval {
  font-size: 18px;
  line-height: 1;
  font-weight: bold;
  letter-spacing: -0.5px;
}
.sval.green { color: #3ecf7a; }
.sval.gold  { color: #e8b84b; }
.sval.cyan  { color: #40c8e0; }
.sval.dim   { color: #3a3550; font-size: 14px; }

/* Bet row */
.bet-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.bet-label {
  font-size: 8px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: #4a3f6b;
  flex-shrink: 0;
  width: 24px;
}

.adj {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  background: #100d1c;
  border: 1px solid #2a2240;
  border-radius: 6px;
  color: #7060a0;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.08s, border-color 0.08s;
}
.adj:active {
  background: #1e1535;
  border-color: #e8b84b;
  color: #e8b84b;
}

.bet-mid {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}

.bet-val {
  font-size: 26px;
  font-weight: bold;
  color: #e8b84b;
  line-height: 1;
  letter-spacing: -0.5px;
}

.bet-sub {
  font-size: 9px;
  color: #3ecf7a;
  opacity: 0.6;
  letter-spacing: 0.5px;
}

/* Buy button */
#buybtn {
  height: 52px;
  background: #0b1a0e;
  border: 1px solid #1e4228;
  border-radius: 8px;
  color: #3ecf7a;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: background 0.1s, border-color 0.1s;
}
#buybtn:active:not(:disabled) {
  background: #122a17;
  border-color: #3ecf7a;
}
#buybtn:disabled { opacity: 0.22; cursor: not-allowed; }

.bcost {
  color: #3ecf7a;
  opacity: 0.5;
  font-size: 13px;
  font-weight: normal;
}
</style>
</head>
<body>

<div id="app">
<canvas id="c"></canvas>

<div id="hud">
  <div class="stats">
    <div class="stat">
      <div class="slabel">Balance</div>
      <div class="sval green" id="ubal">$100</div>
    </div>
    <div class="stat">
      <div class="slabel">Level</div>
      <div class="sval cyan" id="ulvl">1</div>
    </div>
    <div class="stat">
      <div class="slabel">Balls</div>
      <div class="sval cyan" id="uballs">1</div>
    </div>
    <div class="stat">
      <div class="slabel">Bricks</div>
      <div class="sval dim" id="ubricks">—</div>
    </div>
  </div>

  <div class="bet-row">
    <div class="bet-label">Bet</div>
    <button class="adj" id="bdown">‹</button>
    <div class="bet-mid">
      <div class="bet-val" id="ubet">$1.00</div>
      <div class="bet-sub" id="uphit">+$0.030 per hit</div>
    </div>
    <button class="adj" id="bup">›</button>
  </div>

  <button id="buybtn">
    BUY BALL
    <span class="bcost" id="ubcost">$5.00</span>
  </button>
</div>
</div>

<script>
// ─────────────────────────────────────────────────────
// CANVAS SETUP — virtual coordinate space, scaled to screen
// ─────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;

// Virtual coordinate space — game logic always runs at REF_W wide.
// Canvas rendering is scaled to fit the real screen.
const REF_W = 390;
let W = REF_W, H = 0, SCALE = 1;

// All game constants are derived from W/H at init/resize
let BALL_R, GUT, BCOLS, BROWS, BW, BH, BGAP, BOX, BOY;
let COIN_R;

function computeConstants() {
  BALL_R = Math.round(W * 0.022);   // ~8.5px on 390
  GUT    = Math.round(W * 0.14);    // ~54px corner dead zone
  COIN_R = Math.round(W * 0.020);

  BCOLS  = 5;
  BROWS  = 7;
  BGAP   = Math.round(W * 0.020);
  BW     = Math.round((W - 24 - BGAP * (BCOLS - 1)) / BCOLS);
  BH     = Math.round(BW * 0.38);
  BOX    = Math.round((W - (BCOLS * BW + (BCOLS - 1) * BGAP)) / 2);
  BOY    = Math.round(H * 0.11);
}

function resize() {
  const rect = canvas.getBoundingClientRect();
  const realW = rect.width;
  const realH = rect.height;
  SCALE = realW / REF_W;
  W = REF_W;
  H = realH / SCALE;
  canvas.width  = Math.round(realW * DPR);
  canvas.height = Math.round(realH * DPR);
  ctx.scale(SCALE * DPR, SCALE * DPR);
  computeConstants();

  // Rebuild bricks to fit new layout
  if (G) {
    G.bricks = genBricks(G.level);
    // Reposition balls within bounds
    for (const b of G.balls) {
      b.x = Math.min(Math.max(b.x, BALL_R), W - BALL_R);
      b.y = Math.min(Math.max(b.y, BALL_R), H - BALL_R);
    }
  }
}

window.addEventListener('resize', () => {
  ctx.setTransform(1, 0, 0, 1, 0, 0); // reset before re-scale
  resize();
});

// ─────────────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────────────
let AC = null;
function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function noise(freq, fEnd, vol, dur) {
  try {
    const a=getAC(),t=a.currentTime,buf=a.createBuffer(1,a.sampleRate*dur|0,a.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.6);
    const src=a.createBufferSource();src.buffer=buf;
    const f=a.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(freq,t);
    if(fEnd)f.frequency.exponentialRampToValueAtTime(fEnd,t+dur);f.Q.value=2.8;
    const g=a.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(f);f.connect(g);g.connect(a.destination);src.start(t);src.stop(t+dur+0.01);
  }catch(e){}
}
function sine(freq,fEnd,vol,dur,delay) {
  try {
    const a=getAC(),t=a.currentTime+(delay||0),o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(freq,t);
    if(fEnd)o.frequency.exponentialRampToValueAtTime(fEnd,t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+0.01);
  }catch(e){}
}
function tri(freq,vol,dur,delay) {
  try {
    const a=getAC(),t=a.currentTime+(delay||0),o=a.createOscillator(),g=a.createGain();
    o.type='triangle';o.frequency.value=freq;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+0.01);
  }catch(e){}
}
function sndHit(hp)      { const f=180+(20-hp)*52; noise(f,f*.55,.55,.07); sine(f*1.4,f*.9,.09,.05); }
function sndBreak()      { noise(420,90,.8,.20); sine(260,65,.14,.18); tri(180,.1,.22); }
function sndCoinBounce() { sine(1600,750,.08,.04); }
function sndCoinGet()    { [523,659,784,1047,1319].forEach((f,i)=>{sine(f,null,.18,.22,i*.06);tri(f*.5,.06,.18,i*.06);}); }
function sndLost()       { try{const a=getAC(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(75,t+.5);g.gain.setValueAtTime(.16,t);g.gain.exponentialRampToValueAtTime(.0001,t+.5);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.52);}catch(e){} }
function sndLevelUp()    { [392,494,587,784,988,1175].forEach((f,i)=>{tri(f,.14,.35,i*.1);sine(f*2,null,.06,.25,i*.1);}); }

// ─────────────────────────────────────────────────────
// COLOR
// ─────────────────────────────────────────────────────
const PAL=[[255,35,35],[255,130,0],[220,220,0],[40,210,120],[30,150,255]];
function brickRGB(hp,max=20){
  const t=Math.max(0,Math.min(1,hp/max)),seg=PAL.length-1,si=Math.min(0|t*seg,seg-1),st=t*seg-si;
  const a=PAL[si],b=PAL[si+1];
  return[(a[0]+(b[0]-a[0])*st),(a[1]+(b[1]-a[1])*st),(a[2]+(b[2]-a[2])*st)].map(Math.round);
}
function brickCol(hp){ const[r,g,b]=brickRGB(hp); return`rgb(${r},${g},${b})`; }
function brickGlw(hp){ const[r,g,b]=brickRGB(hp); return`rgba(${r},${g},${b},0.55)`; }

// ─────────────────────────────────────────────────────
// GUTTER  (L1 distance from corner)
// ─────────────────────────────────────────────────────
function inGutter(x,y) {
  return (x+y<GUT) || ((W-x)+y<GUT) || (x+(H-y)<GUT) || ((W-x)+(H-y)<GUT);
}

// ─────────────────────────────────────────────────────
// BRICK GEN
// ─────────────────────────────────────────────────────
function genBricks(level) {
  const total=BCOLS*BROWS, count=Math.min(8+(level-1)*4, total-2);
  const slots=Array.from({length:total},(_,i)=>i);
  for(let i=slots.length-1;i>0;i--){const j=0|(Math.random()*(i+1));[slots[i],slots[j]]=[slots[j],slots[i]];}
  return slots.slice(0,count).map(s=>{
    const col=s%BCOLS, row=0|(s/BCOLS);
    return { x:BOX+col*(BW+BGAP), y:BOY+row*(BH+BGAP), w:BW, h:BH, hp:20, maxHp:20, flash:0, shake:0 };
  });
}

// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
const BET_OPTS=[0.10,0.25,0.50,1.00,2.00,5.00,10.00,25.00,50.00,100.00];
let betIdx=3;

const G={
  balance:100, bet:1.00, level:1,
  balls:[], bricks:[], coins:[], parts:[], floats:[],
  ballCost:5, lvlDone:false, lvlTimer:0
};

function spawnBall() {
  const spd=Math.min(W,H)*0.011 + G.level*0.4;
  const ang=-Math.PI/2+(Math.random()-.5)*Math.PI*.65;
  G.balls.push({
    x: W/2+(Math.random()-.5)*W*0.3,
    y: H*0.8,
    vx: Math.cos(ang)*spd,
    vy: Math.sin(ang)*spd,
    trail: [],
  });
}

function spawnCoin(x,y) {
  const gravity=H*0.00035;
  G.coins.push({ x, y, vx:(Math.random()-.5)*W*0.006, vy:-H*0.003*(0.7+Math.random()*1.4),
                 gravity, bounces:0, age:0, alive:true, sh:Math.random()*Math.PI*2 });
}

function burst(x,y,rgb,n=10) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=W*0.004+Math.random()*W*0.010;
    G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:W*0.004+Math.random()*W*0.006,life:1,color:`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`});
  }
}

function pay(amt,x,y,color) {
  G.balance+=amt;
  G.floats.push({x,y,text:'+$'+amt.toFixed(2),life:1.3,vy:-H*0.002,color:color||'#3ecf7a'});
  updateUI();
}

// ─────────────────────────────────────────────────────
// COLLISION
// ─────────────────────────────────────────────────────
function circRect(bx,by,r,rx,ry,rw,rh) {
  const cx=Math.max(rx,Math.min(bx,rx+rw)),cy=Math.max(ry,Math.min(by,ry+rh));
  return (bx-cx)**2+(by-cy)**2<r*r;
}

function bounceOff(ball,br) {
  const cx=Math.max(br.x,Math.min(ball.x,br.x+br.w));
  const cy=Math.max(br.y,Math.min(ball.y,br.y+br.h));
  const dx=ball.x-cx, dy=ball.y-cy;
  if(Math.abs(dx)>=Math.abs(dy)){ ball.vx=-ball.vx; ball.x+=ball.vx*1.5; }
  else                           { ball.vy=-ball.vy; ball.y+=ball.vy*1.5; }
}

function clampAngle(ball) {
  const spd=Math.hypot(ball.vx,ball.vy), MIN=spd*0.18;
  if(Math.abs(ball.vy)<MIN){ ball.vy=MIN*(ball.vy>=0?1:-1); ball.vx=Math.sqrt(spd*spd-ball.vy*ball.vy)*(ball.vx>=0?1:-1); }
}

// ─────────────────────────────────────────────────────
// UPDATE
// ─────────────────────────────────────────────────────
const COIN_DAMP=0.48, COIN_MAXB=5, COIN_TTL=520;
const TRAIL_LEN=7;

function update() {
  if(G.lvlDone){ if(--G.lvlTimer<=0){ G.level++; G.bricks=genBricks(G.level); G.coins=[]; G.lvlDone=false; updateUI(); } return; }
  if(G.bricks.length===0&&G.balls.length>0){ G.lvlDone=true; G.lvlTimer=210; sndLevelUp(); return; }

  // Balls
  for(let i=G.balls.length-1;i>=0;i--) {
    const b=G.balls[i];
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>TRAIL_LEN) b.trail.shift();
    b.x+=b.vx; b.y+=b.vy;

    if(inGutter(b.x,b.y)){ G.balls.splice(i,1); sndLost(); updateUI(); continue; }

    if(b.x-BALL_R<0)  {b.x=BALL_R;    b.vx= Math.abs(b.vx);}
    if(b.x+BALL_R>W)  {b.x=W-BALL_R;  b.vx=-Math.abs(b.vx);}
    if(b.y-BALL_R<0)  {b.y=BALL_R;    b.vy= Math.abs(b.vy);}
    if(b.y+BALL_R>H)  {b.y=H-BALL_R;  b.vy=-Math.abs(b.vy);}
    clampAngle(b);

    for(let j=G.bricks.length-1;j>=0;j--) {
      const br=G.bricks[j];
      if(!circRect(b.x,b.y,BALL_R,br.x,br.y,br.w,br.h)) continue;
      bounceOff(b,br);
      br.hp--; br.flash=8; if(br.hp<=4) br.shake=4;
      sndHit(Math.max(1,br.hp));
      pay(G.bet*0.03, br.x+br.w/2, br.y-H*0.016);
      if(Math.random()<0.09) spawnCoin(br.x+br.w/2+(Math.random()-.5)*br.w*.6, br.y+br.h+2);
      if(br.hp<=0){ burst(br.x+br.w/2,br.y+br.h/2,brickRGB(5),14); pay(G.bet*0.25,br.x+br.w/2,br.y+br.h/2,'#e8b84b'); sndBreak(); G.bricks.splice(j,1); }
      break;
    }

    for(let k=G.coins.length-1;k>=0;k--) {
      const co=G.coins[k]; if(!co.alive) continue;
      if((b.x-co.x)**2+(b.y-co.y)**2<(BALL_R+COIN_R)**2){ co.alive=false; pay(G.bet*0.45,co.x,co.y-H*0.025,'#ffd700'); sndCoinGet(); burst(co.x,co.y,[255,215,0],12); }
    }
  }

  // Coins
  G.coins=G.coins.filter(c=>c.alive);
  for(let i=G.coins.length-1;i>=0;i--) {
    const co=G.coins[i];
    co.vy+=co.gravity; co.x+=co.vx; co.y+=co.vy; co.age++; co.sh+=0.10;
    if(co.y+COIN_R>H-2){ co.y=H-2-COIN_R; co.vy*=-COIN_DAMP; co.vx*=0.82; co.bounces++;
      if(Math.abs(co.vy)>0.8) sndCoinBounce();
      if(co.bounces>=COIN_MAXB||Math.abs(co.vy)<0.35){ G.coins.splice(i,1); continue; }
    }
    if(co.x-COIN_R<0)  {co.x=COIN_R;   co.vx= Math.abs(co.vx);}
    if(co.x+COIN_R>W)  {co.x=W-COIN_R; co.vx=-Math.abs(co.vx);}
    if(co.age>COIN_TTL) G.coins.splice(i,1);
  }

  for(let i=G.parts.length-1;i>=0;i--){ const p=G.parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=H*0.0002; p.life-=0.025; if(p.life<=0) G.parts.splice(i,1); }
  for(let i=G.floats.length-1;i>=0;i--){ const f=G.floats[i]; f.y+=f.vy; f.life-=0.018; if(f.life<=0) G.floats.splice(i,1); }
  for(const br of G.bricks){ if(br.flash>0) br.flash--; if(br.shake>0) br.shake--; }
}

// ─────────────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────────────
let frame=0;

function draw() {
  frame++;
  ctx.clearRect(0,0,W,H);

  // BG
  ctx.fillStyle='#06050e';
  ctx.fillRect(0,0,W,H);

  // Subtle dot grid
  ctx.fillStyle='rgba(80,60,160,0.07)';
  const gs=Math.round(W/12);
  for(let x=gs;x<W;x+=gs) for(let y=gs;y<H;y+=gs){ ctx.beginPath(); ctx.arc(x,y,1,0,Math.PI*2); ctx.fill(); }

  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.75);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // Gutters
  const corners=[[0,0,GUT,0,0,GUT],[W,0,W-GUT,0,W,GUT],[0,H,GUT,H,0,H-GUT],[W,H,W-GUT,H,W,H-GUT]];
  const flash=0.55+Math.abs(Math.sin(frame*0.04))*0.2;
  corners.forEach(([x1,y1,x2,y2,x3,y3])=>{
    // Fill
    ctx.fillStyle=`rgba(30,0,0,0.92)`;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.fill();
    // Danger stripe pattern
    ctx.save();
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.clip();
    const stripeW=GUT*0.22;
    for(let s=-2;s<8;s++){
      const offset=s*stripeW*2;
      ctx.fillStyle=`rgba(120,0,0,0.18)`;
      ctx.beginPath(); ctx.moveTo(x1+offset,y1); ctx.lineTo(x1+offset+stripeW,y1); ctx.lineTo(x1+offset+stripeW,y1+GUT*2); ctx.lineTo(x1+offset,y1+GUT*2); ctx.closePath();
      // simpler: just draw angled lines
    }
    ctx.restore();
    // Edge glow
    ctx.strokeStyle=`rgba(200,20,20,${flash*0.55})`;
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x3,y3); ctx.stroke();
  });

  // OUT labels
  const fs=Math.round(W*0.018);
  ctx.fillStyle='rgba(200,30,30,0.45)';
  ctx.font=`${fs}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const goff=GUT*0.36;
  [[goff,goff],[W-goff,goff],[goff,H-goff],[W-goff,H-goff]].forEach(([x,y])=>ctx.fillText('OUT',x,y));

  // Bricks
  const brickFontSize=Math.round(BH*0.45);
  for(const br of G.bricks){
    const sx=br.shake>0?(Math.random()-.5)*W*0.005:0;
    const sy=br.shake>0?(Math.random()-.5)*W*0.005:0;
    const bx=br.x+sx, by=br.y+sy;
    const col=brickCol(br.hp), glw=brickGlw(br.hp);
    ctx.save();
    ctx.shadowColor=br.flash>0?'#fff':glw;
    ctx.shadowBlur=br.flash>0?BH*0.9:BH*0.25;
    ctx.fillStyle=br.flash>0?'#fff':col;
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(bx,by,br.w,br.h,3); else ctx.rect(bx,by,br.w,br.h);
    ctx.fill();
    ctx.restore();
    // Bevel
    ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bx+3,by+1); ctx.lineTo(bx+br.w-3,by+1); ctx.stroke();
    // HP number
    ctx.fillStyle=br.flash>0?'#111':'rgba(255,255,255,0.85)';
    ctx.font=`bold ${brickFontSize}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(br.hp, bx+br.w/2, by+br.h/2+1);
  }

  // Coins
  for(const co of G.coins){
    const p=0.88+Math.sin(co.sh)*0.12, fade=Math.min(1,(COIN_TTL-co.age)/80);
    ctx.save(); ctx.globalAlpha=fade;
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=COIN_R*1.4*p;
    const gr=ctx.createRadialGradient(co.x-COIN_R*0.25,co.y-COIN_R*0.25,COIN_R*0.08,co.x,co.y,COIN_R);
    gr.addColorStop(0,'#fff8c0'); gr.addColorStop(0.45,'#ffd700'); gr.addColorStop(1,'#9a5a00');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.arc(co.x,co.y,COIN_R*p,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=fade*0.8;
    ctx.fillStyle='rgba(50,25,0,0.9)';
    ctx.font=`bold ${Math.round(COIN_R*1.1)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('$',co.x,co.y+1);
    ctx.restore();
  }

  // Balls
  for(const b of G.balls){
    // Trail
    b.trail.forEach((pt,ti)=>{
      const a=(ti+1)/(b.trail.length+1)*0.32;
      ctx.fillStyle=`rgba(64,200,224,${a})`;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,BALL_R*0.4*((ti+1)/b.trail.length),0,Math.PI*2); ctx.fill();
    });
    // Ball
    ctx.save();
    ctx.shadowColor='#80e8ff'; ctx.shadowBlur=BALL_R*2.2;
    const bg=ctx.createRadialGradient(b.x-BALL_R*.32,b.y-BALL_R*.32,BALL_R*.08,b.x,b.y,BALL_R);
    bg.addColorStop(0,'#ffffff');
    bg.addColorStop(0.28,'#b8f0ff');
    bg.addColorStop(0.72,'#1888cc');
    bg.addColorStop(1,'#051840');
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Particles
  ctx.save();
  for(const p of G.parts){ ctx.globalAlpha=Math.max(0,p.life**2); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }
  ctx.restore();

  // Float text
  const floatFont=Math.round(W*0.035);
  ctx.save();
  for(const f of G.floats){
    ctx.globalAlpha=Math.min(1,f.life*1.5);
    ctx.shadowColor=f.color; ctx.shadowBlur=floatFont*.6;
    ctx.fillStyle=f.color;
    ctx.font=`bold ${floatFont}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.restore();

  // Level complete overlay
  if(G.lvlDone){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    const sc=1+Math.sin(frame*.07)*.035;
    ctx.save(); ctx.translate(W/2,H/2); ctx.scale(sc,sc);
    ctx.shadowColor='#e8b84b'; ctx.shadowBlur=W*0.08;
    ctx.fillStyle='#e8b84b';
    ctx.font=`bold ${Math.round(W*0.085)}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('LEVEL COMPLETE',0,-H*0.04);
    ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.font=`${Math.round(W*0.038)}px monospace`;
    ctx.fillText('Level '+(G.level+1)+' incoming…',0,H*0.045);
    ctx.restore();
  }

  // No balls state
  if(G.balls.length===0&&!G.lvlDone){
    const p=0.55+Math.abs(Math.sin(frame*.055))*.45;
    ctx.fillStyle=`rgba(140,0,0,${0.08*p})`; ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.shadowColor='#ff3030'; ctx.shadowBlur=W*0.05;
    ctx.fillStyle=`rgba(255,60,60,${0.8+p*.2})`;
    ctx.font=`bold ${Math.round(W*0.045)}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('ALL BALLS LOST',W/2,H/2-H*0.025);
    ctx.shadowBlur=0; ctx.fillStyle='rgba(200,60,60,0.65)';
    ctx.font=`${Math.round(W*0.032)}px monospace`;
    ctx.fillText('BUY MORE BELOW ↓',W/2,H/2+H*0.03);
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────
// LOOP
// ─────────────────────────────────────────────────────
function loop(){ update(); draw(); requestAnimationFrame(loop); }

// ─────────────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────────────
function updateUI(){
  const b=G.balance;
  document.getElementById('ubal').textContent   = b>=100?'$'+(b|0):'$'+b.toFixed(2);
  document.getElementById('ulvl').textContent   = G.level;
  document.getElementById('uballs').textContent = G.balls.length;
  document.getElementById('ubricks').textContent= G.bricks.length||'—';
  document.getElementById('ubet').textContent   = '$'+G.bet.toFixed(2);
  document.getElementById('ubcost').textContent = '$'+G.ballCost.toFixed(2);
  document.getElementById('uphit').textContent  = '+$'+(G.bet*0.03).toFixed(3)+' per hit';
  document.getElementById('buybtn').disabled    = G.balance<G.ballCost;
}

document.getElementById('bdown').addEventListener('click',()=>{ if(betIdx>0){betIdx--;G.bet=BET_OPTS[betIdx];updateUI();} });
document.getElementById('bup').addEventListener('click',()=>{ if(betIdx<BET_OPTS.length-1){betIdx++;G.bet=BET_OPTS[betIdx];updateUI();} });
document.getElementById('buybtn').addEventListener('click',()=>{
  getAC();
  if(G.balance<G.ballCost) return;
  G.balance-=G.ballCost;
  G.ballCost=Math.round(G.ballCost*1.65*100)/100;
  spawnBall();
  updateUI();
});

// ─────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────
// Wait one frame for layout to settle
requestAnimationFrame(()=>{
  resize();
  G.bricks=genBricks(G.level);
  spawnBall();
  updateUI();
  loop();
});
</script>
</body>
